name: Manage Remote Stack

on:
  workflow_dispatch:
    inputs:
      command:
        description: Aktion für den Remote-Stack
        required: true
        default: update
        type: choice
        options:
          - start
          - stop
          - restart
          - update
          - status
          - cleanup
          - disk-usage
          - clickhouse-debug
          - clickhouse-nuke

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Execute ${{ inputs.command }} on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -eo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            case "${{ inputs.command }}" in
              start)
                git fetch origin main && git checkout main && git pull origin main
                docker compose up -d
                ;;
              stop)
                docker compose down
                ;;
              restart)
                docker compose down
                docker compose up -d
                ;;
              update)
                git fetch origin main && git checkout main && git pull origin main
                docker compose pull
                docker compose up -d --remove-orphans
                ;;
              status)
                echo "=== Container Status ==="
                docker compose ps
                echo ""
                echo "=== Disk Usage ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df
                ;;
              cleanup)
                echo "=== Disk before cleanup ==="
                df -h /
                echo ""
                echo "Removing unused Docker images (not used by running containers)..."
                docker image prune -af --filter "until=24h" || true
                echo ""
                echo "Removing stopped containers..."
                docker container prune -f || true
                echo ""
                echo "Removing unused build cache..."
                docker builder prune -af || true
                echo ""
                echo "Removing unused networks..."
                docker network prune -f || true
                echo ""
                echo "=== Disk after cleanup ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage after ==="
                docker system df
                ;;
              disk-usage)
                echo "=== System Disk ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df -v 2>/dev/null | head -60
                echo ""
                echo "=== Largest directories in /var ==="
                du -sh /var/* 2>/dev/null | sort -rh | head -10 || true
                ;;
              clickhouse-debug)
                CH="docker exec kuba-plausible-events-db-1 clickhouse-client"
                echo "=== All databases ==="
                $CH --query "SHOW DATABASES" 2>/dev/null || true
                echo ""
                echo "=== All tables in plausible DB ==="
                $CH --query "SHOW TABLES FROM plausible" 2>/dev/null || true
                echo ""
                echo "=== Partitions with sizes ==="
                $CH --query "
                  SELECT database, table, partition,
                    formatReadableSize(sum(bytes_on_disk)) AS size,
                    count() AS parts
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table, partition
                  ORDER BY database, table, partition
                " 2>/dev/null || true
                echo ""
                echo "=== Total ClickHouse disk usage by table ==="
                $CH --query "
                  SELECT database, table,
                    formatReadableSize(sum(bytes_on_disk)) AS total_size
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table
                  ORDER BY sum(bytes_on_disk) DESC
                " 2>/dev/null || true
                ;;
              clickhouse-nuke)
                CH="docker exec kuba-plausible-events-db-1 clickhouse-client"
                echo "=== Partitions before ==="
                $CH --query "
                  SELECT database, table, partition,
                    formatReadableSize(sum(bytes_on_disk)) AS size
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table, partition
                  ORDER BY database, table, partition
                " 2>/dev/null || true
                echo ""
                echo "=== Dropping ALL partitions older than 90 days ==="
                CUTOFF=$(date -d '90 days ago' +%Y%m 2>/dev/null || date -v-90d +%Y%m)
                echo "Cutoff: $CUTOFF"
                $CH --query "
                  SELECT DISTINCT database, table, partition
                  FROM system.parts
                  WHERE active = 1 AND partition < '$CUTOFF'
                  ORDER BY database, table, partition
                " 2>/dev/null | while IFS=$'\t' read -r DB TBL PART; do
                  echo "Dropping $DB.$TBL partition $PART ..."
                  docker exec kuba-plausible-events-db-1 clickhouse-client \
                    --database "$DB" \
                    --query "ALTER TABLE $TBL DROP PARTITION '$PART'" 2>/dev/null || \
                  docker exec kuba-plausible-events-db-1 clickhouse-client \
                    --database "$DB" \
                    --query "ALTER TABLE $TBL DROP PARTITION $PART" 2>/dev/null || \
                  echo "  skipped"
                done
                echo ""
                echo "=== Disk after ==="
                df -h /
                ;;
              *)
                echo "Unsupported command: ${{ inputs.command }}"
                exit 1
                ;;
            esac
