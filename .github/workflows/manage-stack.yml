name: Manage Remote Stack

on:
  workflow_dispatch:
    inputs:
      command:
        description: Aktion für den Remote-Stack
        required: true
        default: update
        type: choice
        options:
          - start
          - stop
          - restart
          - update
          - status
          - cleanup
          - disk-usage
          - clickhouse-debug
          - clickhouse-nuke

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Execute ${{ inputs.command }} on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -eo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            case "${{ inputs.command }}" in
              start)
                git fetch origin main && git checkout main && git reset --hard origin/main
                docker compose up -d
                ;;
              stop)
                docker compose down
                ;;
              restart)
                docker compose down
                docker compose up -d
                ;;
              update)
                git fetch origin main && git checkout main
                docker run --rm -v "$PWD/plausible-ce:/target" alpine \
                  sh -c "rm -rf /target/clickhouse/ipv4-only.xml /target/clickhouse/logs.xml /target/clickhouse/low-resources.xml" \
                  2>/dev/null || true
                git reset --hard origin/main
                docker compose pull
                docker compose up -d --remove-orphans
                ;;
              status)
                echo "=== Container Status ==="
                docker compose ps
                echo ""
                echo "=== Disk Usage ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df
                ;;
              cleanup)
                echo "=== Disk before cleanup ==="
                df -h /
                echo ""
                echo "Removing unused Docker images (not used by running containers)..."
                docker image prune -af --filter "until=24h" || true
                echo ""
                echo "Removing stopped containers..."
                docker container prune -f || true
                echo ""
                echo "Removing unused build cache..."
                docker builder prune -af || true
                echo ""
                echo "Removing unused networks..."
                docker network prune -f || true
                echo ""
                echo "=== Disk after cleanup ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage after ==="
                docker system df
                ;;
              disk-usage)
                echo "=== System Disk ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df -v 2>/dev/null | head -60
                echo ""
                echo "=== Largest directories in /var ==="
                du -sh /var/* 2>/dev/null | sort -rh | head -10 || true
                ;;
              clickhouse-debug)
                CH="docker exec kuba-plausible-events-db-1 clickhouse-client"
                echo "=== All databases ==="
                $CH --query "SHOW DATABASES" 2>/dev/null || true
                echo ""
                echo "=== All tables in plausible DB ==="
                $CH --query "SHOW TABLES FROM plausible" 2>/dev/null || true
                echo ""
                echo "=== Partitions with sizes ==="
                $CH --query "
                  SELECT database, table, partition,
                    formatReadableSize(sum(bytes_on_disk)) AS size,
                    count() AS parts
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table, partition
                  ORDER BY database, table, partition
                " 2>/dev/null || true
                echo ""
                echo "=== Total ClickHouse disk usage by table ==="
                $CH --query "
                  SELECT database, table,
                    formatReadableSize(sum(bytes_on_disk)) AS total_size
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table
                  ORDER BY sum(bytes_on_disk) DESC
                " 2>/dev/null || true
                ;;
              clickhouse-nuke)
                set +e
                df -h /

                VOLUME_PATH=$(docker volume inspect kuba_plausible-event-data --format '{{.Mountpoint}}')
                echo "Volume: $VOLUME_PATH"

                docker kill kuba-plausible-events-db-1 2>/dev/null
                docker rm -f kuba-plausible-events-db-1 2>/dev/null
                sleep 3

                echo "=== Top-level volume dirs ==="
                ls -la "$VOLUME_PATH/" 2>/dev/null

                echo "=== Finding and clearing system log dirs ==="
                for TBL in text_log metric_log asynchronous_metric_log query_log query_metric_log part_log trace_log processors_profile_log error_log asynchronous_insert_log; do
                  while IFS= read -r -d '' DIR; do
                    echo "Clearing $TBL at $DIR"
                    find "$DIR" -mindepth 1 -delete 2>/dev/null
                    echo "  done"
                  done < <(find "$VOLUME_PATH" -type d -name "$TBL" -print0 2>/dev/null)
                done

                echo "=== Disk after ==="
                df -h /

                echo "=== Restarting stack ==="
                cd ${{ secrets.DEPLOY_PATH }}
                docker compose up -d
                sleep 10
                docker compose ps
                set -e
                ;;
              *)
                echo "Unsupported command: ${{ inputs.command }}"
                exit 1
                ;;
            esac
