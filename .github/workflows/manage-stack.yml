name: Manage Remote Stack

on:
  workflow_dispatch:
    inputs:
      command:
        description: Aktion für den Remote-Stack
        required: true
        default: update
        type: choice
        options:
          - start
          - stop
          - restart
          - update
          - status
          - cleanup
          - disk-usage
          - clickhouse-debug
          - clickhouse-nuke

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Execute ${{ inputs.command }} on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -eo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            case "${{ inputs.command }}" in
              start)
                git fetch origin main && git checkout main && git pull origin main
                docker compose up -d
                ;;
              stop)
                docker compose down
                ;;
              restart)
                docker compose down
                docker compose up -d
                ;;
              update)
                git fetch origin main && git checkout main && git pull origin main
                docker compose pull
                docker compose up -d --remove-orphans
                ;;
              status)
                echo "=== Container Status ==="
                docker compose ps
                echo ""
                echo "=== Disk Usage ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df
                ;;
              cleanup)
                echo "=== Disk before cleanup ==="
                df -h /
                echo ""
                echo "Removing unused Docker images (not used by running containers)..."
                docker image prune -af --filter "until=24h" || true
                echo ""
                echo "Removing stopped containers..."
                docker container prune -f || true
                echo ""
                echo "Removing unused build cache..."
                docker builder prune -af || true
                echo ""
                echo "Removing unused networks..."
                docker network prune -f || true
                echo ""
                echo "=== Disk after cleanup ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage after ==="
                docker system df
                ;;
              disk-usage)
                echo "=== System Disk ==="
                df -h /
                echo ""
                echo "=== Docker Disk Usage ==="
                docker system df -v 2>/dev/null | head -60
                echo ""
                echo "=== Largest directories in /var ==="
                du -sh /var/* 2>/dev/null | sort -rh | head -10 || true
                ;;
              clickhouse-debug)
                CH="docker exec kuba-plausible-events-db-1 clickhouse-client"
                echo "=== All databases ==="
                $CH --query "SHOW DATABASES" 2>/dev/null || true
                echo ""
                echo "=== All tables in plausible DB ==="
                $CH --query "SHOW TABLES FROM plausible" 2>/dev/null || true
                echo ""
                echo "=== Partitions with sizes ==="
                $CH --query "
                  SELECT database, table, partition,
                    formatReadableSize(sum(bytes_on_disk)) AS size,
                    count() AS parts
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table, partition
                  ORDER BY database, table, partition
                " 2>/dev/null || true
                echo ""
                echo "=== Total ClickHouse disk usage by table ==="
                $CH --query "
                  SELECT database, table,
                    formatReadableSize(sum(bytes_on_disk)) AS total_size
                  FROM system.parts
                  WHERE active = 1
                  GROUP BY database, table
                  ORDER BY sum(bytes_on_disk) DESC
                " 2>/dev/null || true
                ;;
              clickhouse-nuke)
                echo "=== Disk before ==="
                df -h /

                VOLUME_PATH=$(docker volume inspect kuba_plausible-event-data --format '{{.Mountpoint}}')
                echo "ClickHouse volume: $VOLUME_PATH"

                echo "=== Stopping ClickHouse container ==="
                docker stop kuba-plausible-events-db-1

                echo "=== Deleting system log data directories ==="
                for TBL in text_log metric_log asynchronous_metric_log query_log query_metric_log part_log trace_log processors_profile_log error_log asynchronous_insert_log; do
                  DIR="$VOLUME_PATH/store"
                  # ClickHouse stores tables under store/ with UUID-based paths
                  # Also try the legacy data/ path
                  find "$VOLUME_PATH/data/system/$TBL" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null && echo "Cleared data/system/$TBL" || true
                  find "$VOLUME_PATH/shadow" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
                done

                # Also clear via store/ UUID paths (ClickHouse 24.x layout)
                echo "=== Clearing store/ paths for system tables ==="
                if [ -f "$VOLUME_PATH/metadata/system/text_log.sql" ]; then
                  UUID=$(grep -o "UUID '[^']*'" "$VOLUME_PATH/metadata/system/text_log.sql" | head -1 | cut -d"'" -f2)
                  if [ -n "$UUID" ]; then
                    PREFIX=$(echo "$UUID" | cut -c1-3)
                    rm -rf "$VOLUME_PATH/store/$PREFIX/$UUID" 2>/dev/null && echo "Cleared text_log store $UUID" || true
                  fi
                fi

                for TBL in text_log metric_log asynchronous_metric_log query_log query_metric_log part_log trace_log processors_profile_log error_log asynchronous_insert_log; do
                  if [ -f "$VOLUME_PATH/metadata/system/$TBL.sql" ]; then
                    UUID=$(grep -o "UUID '[^']*'" "$VOLUME_PATH/metadata/system/$TBL.sql" | head -1 | cut -d"'" -f2)
                    if [ -n "$UUID" ]; then
                      PREFIX=$(echo "$UUID" | cut -c1-3)
                      STORE_DIR="$VOLUME_PATH/store/$PREFIX/$UUID"
                      if [ -d "$STORE_DIR" ]; then
                        find "$STORE_DIR" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null
                        echo "Cleared $TBL (UUID $UUID)"
                      fi
                    fi
                  fi
                done

                echo "=== Disk after file deletion ==="
                df -h /

                echo "=== Starting ClickHouse container ==="
                docker start kuba-plausible-events-db-1
                sleep 10
                docker ps | grep clickhouse

                echo "=== Disk final ==="
                df -h /
                ;;
              *)
                echo "Unsupported command: ${{ inputs.command }}"
                exit 1
                ;;
            esac
