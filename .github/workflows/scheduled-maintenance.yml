name: Scheduled Maintenance

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  clickhouse-purge:
    name: Purge old Plausible events
    runs-on: ubuntu-latest
    steps:
      - name: Drop old partitions (no extra disk needed)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            CH="docker exec kuba-plausible-events-db-1 clickhouse-client --database plausible"

            echo "=== Disk before ==="
            df -h /

            echo "=== Available partitions ==="
            $CH --query "
              SELECT table, partition, sum(bytes_on_disk) AS bytes
              FROM system.parts
              WHERE database = 'plausible' AND active = 1
              GROUP BY table, partition
              ORDER BY table, partition
            " 2>/dev/null || true

            # Drop partitions older than 365 days (format: YYYYMM)
            CUTOFF=$(date -d '365 days ago' +%Y%m 2>/dev/null || date -v-365d +%Y%m)
            echo "Dropping partitions older than: $CUTOFF"

            for TABLE in events events_v2; do
              PARTITIONS=$($CH --query "
                SELECT DISTINCT partition
                FROM system.parts
                WHERE database = 'plausible' AND table = '$TABLE' AND active = 1
                  AND partition < '$CUTOFF'
                ORDER BY partition
              " 2>/dev/null || true)

              if [ -z "$PARTITIONS" ]; then
                echo "No old partitions in $TABLE"
                continue
              fi

              for PART in $PARTITIONS; do
                echo "Dropping $TABLE partition $PART..."
                $CH --query "ALTER TABLE $TABLE DROP PARTITION '$PART'" 2>/dev/null || \
                $CH --query "ALTER TABLE $TABLE DROP PARTITION $PART" 2>/dev/null || \
                echo "  skipped $PART (may not exist)"
              done
            done

            echo "=== Disk after partition drop ==="
            df -h /

  docker-cleanup:
    name: Prune unused Docker resources
    runs-on: ubuntu-latest
    needs: clickhouse-purge
    steps:
      - name: Remove dangling images, stopped containers, build cache
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            AVAIL_BEFORE=$(df / --output=avail | tail -1)

            docker image prune -af --filter "until=168h" || true
            docker container prune -f || true
            docker builder prune -af || true
            docker network prune -f || true

            AVAIL_AFTER=$(df / --output=avail | tail -1)
            FREED=$(( (AVAIL_AFTER - AVAIL_BEFORE) / 1024 ))
            echo "Docker cleanup freed: ~${FREED} MB"
            df -h /

  disk-check:
    name: Assert disk usage under 80%
    runs-on: ubuntu-latest
    needs: docker-cleanup
    steps:
      - name: Fail if disk still critical after cleanup
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            AVAIL=$(df / --output=avail | tail -1)
            TOTAL=$(df / --output=size | tail -1)
            USED_PCT=$(( (TOTAL - AVAIL) * 100 / TOTAL ))
            AVAIL_GB=$(( AVAIL / 1024 / 1024 ))

            echo "=== Final disk state ==="
            df -h /
            echo ""
            echo "Docker volumes:"
            docker system df -v 2>/dev/null | grep kuba | sort -k4 -rh | head -10 || true

            if [ "$USED_PCT" -ge 80 ]; then
              echo ""
              echo "CRITICAL: Disk at ${USED_PCT}% after cleanup (${AVAIL_GB} GB free)."
              echo "Action required: reduce PLAUSIBLE_RETENTION_DAYS in docker-compose.yml or expand disk."
              exit 1
            fi

            echo "OK: Disk at ${USED_PCT}% (${AVAIL_GB} GB free)."
