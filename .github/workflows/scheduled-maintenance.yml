name: Scheduled Maintenance

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  clickhouse-purge:
    name: Purge ClickHouse logs and old events
    runs-on: ubuntu-latest
    steps:
      - name: Clear system logs and old plausible partitions
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set +e
            echo "=== Disk before ==="
            df -h /

            VOLUME_PATH=$(docker volume inspect kuba_plausible-event-data --format '{{.Mountpoint}}')
            AVAIL=$(df / --output=avail | tail -1)
            CH="docker exec kuba-plausible-events-db-1 clickhouse-client"

            if [ "$AVAIL" -gt 1048576 ]; then
              echo "=== Truncating system log tables via client ==="
              for TBL in text_log metric_log asynchronous_metric_log query_log query_metric_log part_log trace_log processors_profile_log error_log asynchronous_insert_log; do
                $CH --query "TRUNCATE TABLE IF EXISTS system.$TBL" 2>/dev/null && echo "Truncated $TBL" || echo "Skipped $TBL"
              done

              CUTOFF=$(date -d '90 days ago' +%Y%m 2>/dev/null || date -v-90d +%Y%m)
              echo "Dropping plausible partitions older than $CUTOFF"
              for TBL in events_v2 sessions_v2 imported_visitors imported_sources imported_pages imported_entry_pages imported_exit_pages imported_locations imported_devices imported_browsers imported_operating_systems imported_custom_events; do
                PARTS=$($CH --database plausible --query "SELECT DISTINCT partition FROM system.parts WHERE database='plausible' AND table='$TBL' AND active=1 AND partition < '$CUTOFF'" 2>/dev/null || true)
                for PART in $PARTS; do
                  $CH --database plausible --query "ALTER TABLE $TBL DROP PARTITION '$PART'" 2>/dev/null && echo "Dropped plausible.$TBL $PART" || true
                done
              done
            else
              echo "=== Disk full — stopping container, deleting log files directly ==="
              docker kill kuba-plausible-events-db-1 2>/dev/null
              docker rm -f kuba-plausible-events-db-1 2>/dev/null
              sleep 3

              for TBL in text_log metric_log asynchronous_metric_log query_log query_metric_log part_log trace_log processors_profile_log error_log asynchronous_insert_log; do
                while IFS= read -r -d '' DIR; do
                  echo "Clearing $TBL at $DIR"
                  find "$DIR" -mindepth 1 -delete 2>/dev/null
                done < <(find "$VOLUME_PATH" -type d -name "$TBL" -print0 2>/dev/null)
              done

              cd ${{ secrets.DEPLOY_PATH }}
              docker compose up -d
              sleep 15
            fi

            echo "=== Disk after ==="
            df -h /

  docker-cleanup:
    name: Prune unused Docker resources
    runs-on: ubuntu-latest
    needs: clickhouse-purge
    steps:
      - name: Remove dangling images, stopped containers, build cache
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set +e
            AVAIL_BEFORE=$(df / --output=avail | tail -1)

            docker image prune -af --filter "until=168h" || true
            docker container prune -f || true
            docker builder prune -af || true
            docker network prune -f || true

            AVAIL_AFTER=$(df / --output=avail | tail -1)
            FREED=$(( (AVAIL_AFTER - AVAIL_BEFORE) / 1024 ))
            echo "Docker cleanup freed: ~${FREED} MB"
            df -h /

  disk-check:
    name: Assert disk usage under 80%
    runs-on: ubuntu-latest
    needs: docker-cleanup
    steps:
      - name: Fail if disk still critical after cleanup
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            AVAIL=$(df / --output=avail | tail -1)
            TOTAL=$(df / --output=size | tail -1)
            USED_PCT=$(( (TOTAL - AVAIL) * 100 / TOTAL ))
            AVAIL_GB=$(( AVAIL / 1024 / 1024 ))

            echo "=== Final disk state ==="
            df -h /
            echo ""
            echo "Docker volumes:"
            docker system df -v 2>/dev/null | grep kuba | sort -k4 -rh | head -10 || true

            if [ "$USED_PCT" -ge 80 ]; then
              echo ""
              echo "CRITICAL: Disk at ${USED_PCT}% after cleanup (${AVAIL_GB} GB free)."
              exit 1
            fi

            echo "OK: Disk at ${USED_PCT}% (${AVAIL_GB} GB free)."
